# Artifact Contracts: Sensemaking Pipeline

artifacts:
  - id: user_intent
    produced_by: orchestration-runner
    consumed_by:
      - problem-framer
      - unknowns-mapper
      - repo-sensemaker
      - workflow-orchestrator
      - docs-aligner
      - to-prd
      - to-issues
      - triage
      - handoff
    required_sections:
      - raw_intent
      - scope_mode
      - intent_source
      - constraints
      - non_goals
      - machine_readable_intent
    required_machine_fields:
      - artifact_id
      - intent_source
      - scope_mode
      - raw_problem_statement
      - created_at
      - immutable
    verification:
      generic_validator: "python scripts/validate-artifact.py user_intent {artifact_path}"
      specialized_validators:
        - "python scripts/validate-user-intent.py {artifact_path}"
      required_for_modes:
        - plan_only
        - prompt_chain
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: user_intent_amendment
    produced_by: orchestration-runner
    consumed_by:
      - workflow-orchestrator
      - repo-sensemaker
      - prompt-handoff
    required_sections:
      - clarification
    required_machine_fields:
      - artifact_id
      - amends_intent_ref
      - clarification_type
      - requires_reroute
      - created_at
      - created_by
    verification:
      generic_validator: "python scripts/validate-artifact.py user_intent_amendment {artifact_path}"
      specialized_validators:
        - "python scripts/validate-user-intent-amendment.py {artifact_path}"
      required_for_modes:
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: problem_frame
    produced_by: problem-framer
    consumed_by:
      - unknowns-mapper
      - repo-sensemaker
    required_sections:
      - raw_fog
      - problem_under_the_problem
      - object_under_pressure
      - failure_mode
      - success_condition
      - what_must_be_true
      - next_artifact
    verification:
      generic_validator: "python scripts/validate-artifact.py problem_frame {artifact_path}"
      required_for_modes:
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: unknowns_map
    produced_by: unknowns-mapper
    consumed_by:
      - repo-sensemaker
      - prompt-handoff
    required_sections:
      - knowns
      - unknowns
      - assumptions
      - risks
      - research_paths
      - stopping_rule
    required_machine_fields:
      - clarity_assessment
      - unknowns_count
      - assumptions_count
      - research_needed
    verification:
      generic_validator: "python scripts/validate-artifact.py unknowns_map {artifact_path}"
      specialized_validators:
        - "python scripts/validate-unknowns-map.py {artifact_path}"
      required_for_modes:
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: repository_sensemaking_brief
    produced_by: repo-sensemaker
    consumed_by:
      - workflow-orchestrator
      - prompt-handoff
      - sensemaking-docs-reconciler
    required_sections:
      - repository_goal
      - current_shape
      - strong_signals
      - missing_pieces
      - improvement_opportunities
      - weakest_boundary
      - evidence
      - evidence_excerpts
      - why_this_boundary_matters
      - candidate_next_steps
      - recommended_next_step
      - recommended_workflow
      - machine_readable_handoff
      - ready_to_copy_prompt
    required_machine_fields:
      - source_intent_ref
      - recommended_workflow_id
      - recommended_execution_mode
      - weakest_boundary
      - required_inputs
      - user_implied_fog_type
      - primary_fog_type
      - diagnosis_conflict
      - escalation_recommended
    recommended_machine_fields:
      - escalation_target
      - escalation_reason
      - auto_escalation_allowed
    verification:
      generic_validator: "python scripts/validate-artifact.py repository_sensemaking_brief {artifact_path}"
      specialized_validators:
        - "python scripts/validate-brief.py {artifact_path}"
      required_for_modes:
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: discovery_findings
    produced_by: discovery
    consumed_by:
      - opportunity-tree
      - prompt-handoff
    verification:
      generic_validator: "python scripts/validate-artifact.py discovery_findings {artifact_path}"
      required_for_modes:
        - guided_execution
        - autonomous_execution
        - yolo_execution

  - id: domain_alignment_report
