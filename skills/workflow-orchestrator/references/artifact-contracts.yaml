      - chosen_workflow_id
      - execution_mode
      - system_recommended_workflow
      - selected_workflow
      - routing_divergence
      - routing_decision_method
      - escalation_recommended
      - auto_escalation_allowed
      - scope_expansion_requires_approval
      - status
