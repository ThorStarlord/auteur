identity:
  title: "The Shattered Crown"
  author_intent: "A grimdark epic about a hero who succeeds at his quest by becoming the thing he hunted."
  target_experience:
    primary: dread
    progression: "unease -> dread -> catharsis"
    avoid:
      - "triumphant power fantasy"
      - "cozy safety"
  length_class: epic_novel
  genre: grimdark_fantasy
  subgenre: grimdark
  subgenres:
    - grimdark
    - corruption_tragedy
  mode: tragic
  medium: novel
  medium_contract:
    medium: novel
    format: standalone_book
    release_model: complete_release
    interaction_model: passive_reader
    unit_of_delivery: chapter
    representation_units:
      - prose narration
      - scenes
      - chapters
    modulation_biases:
      - sustained immersion
      - controlled interiority
      - chapter-level tension curves
    medium_failure_modes:
      - delivery relies on spectacle the prose cannot directly show
      - chapter pacing ignores reader re-entry and exit points
  target_audience: adult
  pov_type: third_person_limited_multiple

structure:
  estimated_chapters: 45
  act_structure: three_act
  subplot_budget: 3

story_engine:
  main_thread:
    type: main_plot
    want:
      author_text: "Kael wants to end the war by destroying the tyrant who ruined his kingdom."
      checkable_claims:
        - protagonist_goal_has_visible_success_condition
        - goal_generates_active_pursuit
    resistance:
      author_text: "The tyrant's power is bound to the same cursed magic Kael is tempted to use."
      checkable_claims:
        - opposition_blocks_direct_resolution
        - resistance_tempts_protagonist_toward_corruption
    conflict:
      author_text: "Kael can win quickly by becoming ruthless, or preserve his humanity and risk losing the war."
      checkable_claims:
        - external_goal_collides_with_internal_cost
    stakes:
      author_text: "Every victory bought with the ring saves people now while making Kael more dangerous later."
      checkable_claims:
        - stakes_escalate_through_success
        - success_has_visible_cost
    change:
      author_text: "Kael changes from wounded avenger into the new source of the darkness he meant to destroy."
      checkable_claims:
        - ending_state_inverts_starting_intent
    thematic_function: "Tests whether justice becomes corruption when pursued without mercy."
  threads:
    - name: "Lira's restraint"
      type: character_arc
      want:
        author_text: "Lira wants safety and justice without becoming another instrument of vengeance."
        checkable_claims:
          - subplot_goal_contrasts_main_goal
      resistance:
        author_text: "Her trauma and loyalty to Kael pull her toward the same violence she fears."
        checkable_claims:
          - resistance_is_personal_and_relational
      conflict:
        author_text: "Helping Kael may save the realm but also enable his corruption."
        checkable_claims:
          - subplot_pressures_main_relationship
      stakes:
        author_text: "If Lira stays silent, Kael falls; if she opposes him, she may lose the person she trusts most."
        checkable_claims:
          - stakes_force_relational_choice
      change:
        author_text: "Lira moves from surviving harm to naming limits and refusing vengeance."
        checkable_claims:
          - arc_has_visible_refusal
      supports_main_by:
        - contrasts
        - pressures_change
      thematic_function: "Contrasts Kael by showing restraint as a form of strength."
    - name: "The ring's cost"
      type: survival
      want:
        author_text: "The group wants to use the ring only when survival leaves no clean option."
        checkable_claims:
          - system_thread_creates_repeatable_cost
      resistance:
        author_text: "Each use solves immediate danger while worsening the ring's hold on Kael."
        checkable_claims:
          - resistance_escalates_with_use
      conflict:
        author_text: "Refusing the ring risks death, but using it makes future mercy less likely."
        checkable_claims:
          - system_rule_forces_bad_choices
      stakes:
        author_text: "The ring turns survival decisions into moral debt that compounds across chapters."
        checkable_claims:
          - stakes_accumulate_over_time
      change:
        author_text: "The ring shifts from desperate tool to governing appetite."
        checkable_claims:
          - thread_changes_pressure_over_time
      supports_main_by:
        - escalates
        - pays_off
      thematic_function: "Makes the cost of power visible before Kael accepts it as identity."

contract:
  content_rating: R
  explicit_violence: allowed
  explicit_sex: fade_to_black
  profanity: moderate
  on_page_torture: false
  child_harm: false
  mandatory_ending_tone: bittersweet
  expected_elements:
    - mentor_death
    - major_betrayal
    - at_least_3_battles
    - protagonist_low_point_at_75_percent
    - thematic_reverberation_in_all_subplots
  forbidden_tropes:
    - chosen_one_prophecy
    - resurrected_hero
    - deus_ex_machina_rescue
  custom_rules:
    - "No character can wield magic without paying a visible physical cost."
    - "No fully hopeful resolution; bittersweet only."

emotional_design:
  overall_emotional_arc: "descent into dread, then a defiant spike of hard-won meaning"
  per_act_tones:
    - act_index: 1
      label: Setup
      tone: "mystery and intrigue, subtle unease"
    - act_index: 2
      label: Confrontation
      tone: "rising dread with moments of camaraderie"
    - act_index: 3
      label: Resolution
      tone: "despair sharpening into catharsis"

characters:
  - name: Kael
    role: protagonist
    arc_type: corruption
    arc_start_percentage: 0
    arc_end_percentage: 100
    current_arc_percentage: 42
    key_milestones:
      - at_percentage: 25
        description: "Kael takes the ring despite Lira's warning."
      - at_percentage: 50
        description: "Kael kills a former ally to protect the ring."
      - at_percentage: 75
        description: "Kael realizes he is becoming the tyrant he hunted."
      - at_percentage: 100
        description: "Kael defeats Malachai but loses himself to the corruption."
    identity:
      archetype:
        core: avenger
        shadow: destroyer
      narrative_role:
        primary: protagonist
        secondary:
          - catalyst
      psychology:
        wound: "witnessed his family's massacre"
        vulnerability_family: powerlessness
        defense_mechanisms:
          - compartmentalization
        validation_dependency:
          - external_needed
          - service
        intimacy:
          access_pattern: guarded_progressive
          caregiving:
            openness: 0.7
            safety_prerequisites:
              - emotional_safety
            trust_triggers:
              - shared_sacrifice
            trust_blocks:
              - betrayal
              - public_exposure
          romantic:
            openness: 0.1
            dependency_willingness: 0.1
            safety_prerequisites:
              - proven_loyalty
            trust_triggers:
              - shared_vulnerability
            trust_blocks:
              - abandonment
      texture:
        voice:
          cadence: "short, clipped sentences"
          vocabulary: "military precision"
        social_aura: "intimidating presence"
    current_state:
      location: taverntown
      physical: broken_arm
      emotional: vengeful
      inventory:
        - cursed_ring
        - fathers_dagger
      relationships:
        - other: Lira
          kind: trust
          intensity: 0.8
        - other: Malachai
          kind: fear
          intensity: 0.4
      secrets_known:
        - "the ring whispers in his sleep"

  - name: Lira
    role: deuteragonist
    arc_type: healing
    arc_start_percentage: 10
    arc_end_percentage: 90
    current_arc_percentage: 42
    key_milestones:
      - at_percentage: 25
        description: "Names her trauma aloud for the first time."
      - at_percentage: 50
        description: "Refuses to take vengeance when offered it."
      - at_percentage: 75
        description: "Chooses to stay with Kael despite his corruption."
      - at_percentage: 90
        description: "Forgives the surviving cousin who betrayed her family."
    identity:
      archetype:
        core: healer
        shadow: victim
      narrative_role:
        primary: deuteragonist
        secondary:
          - moral_compass
      psychology:
        wound: "survived a family betrayal"
        vulnerability_family: abandonment
        defense_mechanisms:
          - intellectualization
        validation_dependency:
          - relationships
          - service
        intimacy:
          access_pattern: open_cautious
          caregiving:
            openness: 0.8
            safety_prerequisites:
              - proven_trustworthiness
            trust_triggers:
              - witnessing_vulnerability
            trust_blocks:
              - deception
          romantic:
            openness: 0.4
            dependency_willingness: 0.3
            safety_prerequisites:
              - emotional_safety
            trust_triggers:
              - mutual_respect
            trust_blocks:
              - betrayal
      texture:
        voice:
          cadence: "measured, reflective"
          vocabulary: "emotional precision"
        social_aura: "warm but guarded"
    current_state:
      location: taverntown
      physical: exhausted
      emotional: "quietly hopeful"
      relationships:
        - other: Kael
          kind: trust
          intensity: 0.7

  - name: Malachai
    role: antagonist
    arc_type: flat
    arc_start_percentage: 0
    arc_end_percentage: 0
    current_arc_percentage: 0
    identity:
      archetype:
        core: ruler
        shadow: tyrant
      narrative_role:
        primary: antagonist
        secondary:
          - shadow
      psychology:
        wound: "consumed by the same ring's corruption"
        vulnerability_family: powerlessness
        defense_mechanisms:
          - grandiosity
        validation_dependency:
          - status
          - autonomy
        intimacy:
          access_pattern: transactional
          caregiving:
            openness: 0.1
            safety_prerequisites:
              - absolute_loyalty
            trust_triggers:
              - submission
            trust_blocks:
              - defiance
          romantic:
            openness: 0.0
            dependency_willingness: 0.0
            safety_prerequisites:
              - total_control
            trust_triggers:
              - utility_proven
            trust_blocks:
              - vulnerability_display
      texture:
        voice:
          cadence: "slow, deliberate, theatrical"
          vocabulary: "archaic grandeur"
        social_aura: " crushing authority"
    current_state:
      location: dark_tower
      physical: ancient
      emotional: "coldly triumphant"
      inventory:
        - mothers_pendant
      relationships:
        - other: Kael
          kind: trust
          intensity: 0.7

tension_waveform:
  target_curve:
    - { chapter_index: 1,  score: 4,  label: cold_open_unease }
    - { chapter_index: 11, score: 7,  label: first_act_break }
    - { chapter_index: 22, score: 9,  label: midpoint_battle }
    - { chapter_index: 23, score: 3,  label: recovery_valley }
    - { chapter_index: 27, score: 3,  label: quiet_bonding }
    - { chapter_index: 33, score: 8,  label: all_is_lost_ramp }
    - { chapter_index: 42, score: 10, label: climax }
    - { chapter_index: 45, score: 5,  label: bittersweet_coda }
  realized_scores: [4, 5, 5, 6, 6, 7, 6, 6, 7, 7, 7, 6, 6, 7, 7, 8, 8, 7, 8, 8, 9, 9, 3, 4, 5, 4]

theme:
  central_question: "What does redemption cost when the cost is paid by someone else?"
  thesis: "Some debts cannot be honored without becoming the thing you hunted."
  motifs:
    - "broken crowns"
    - "wounded hands"
    - "rings that whisper"
