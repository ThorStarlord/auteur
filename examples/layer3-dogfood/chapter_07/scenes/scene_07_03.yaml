    - what: "Daniel claims he was at the archive during the incident"
      how_known: external_source
      degree: probable
      source: character_id
    - what: "Archive access record was altered"
      how_known: perceived
      degree: certain
      source: document
    - what: "Someone has capability to modify historical records"
      how_known: inferred
      degree: certain
      source: inference
    - what: "Daniel is aware she is investigating the archive"
      how_known: inferred
