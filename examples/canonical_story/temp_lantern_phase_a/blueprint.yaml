identity:
  title: The Shattered Crown
  author_intent: A grimdark epic about a hero who succeeds at his quest by becoming
    the thing he hunted.
  target_experience:
    primary: dread
    progression: unease -> dread -> catharsis
    secondary: []
    avoid:
    - triumphant power fantasy
    - cozy safety
    primary_emotional_promise: dread
    secondary_palette: []
    avoided_experiences:
    - triumphant power fantasy
    - cozy safety
    emotional_trajectory: null
    genre_emotion_stack: null
    pov_experience_contracts: null
  length_class: epic_novel
  genre: grimdark_fantasy
  subgenre: grimdark
  subgenres:
  - grimdark
  - corruption_tragedy
  mode: tragic
  medium: novel
  medium_contract:
    medium: novel
    format: standalone_book
    release_model: complete_release
    interaction_model: passive_reader
    unit_of_delivery: chapter
    representation_units:
    - prose narration
    - scenes
    - chapters
    modulation_biases:
    - sustained immersion
    - controlled interiority
    - chapter-level tension curves
    medium_failure_modes:
    - delivery relies on spectacle the prose cannot directly show
    - chapter pacing ignores reader re-entry and exit points
  target_audience: adult
  pov_type: third_person_limited_multiple
  genre_contract_snapshot:
    genre_id: grimdark_fantasy
    display_name: Grimdark Fantasy
    core_truth: Power is morally contaminating; survival often requires compromise.
    audience_product: Dread, moral pressure, pyrrhic victory, compromised agency.
    primary_excitement_beats:
    - victory that creates new cost
    - moral line crossed under pressure
    - idealism punished by reality
    - power gained through contamination
    required_tropes:
    - corrupting power
    - morally compromised protagonist
    - institutional brutality
    - costly victory
    optional_tropes: []
    forbidden_mismatches:
    - clean heroic triumph
    - cozy safety
    - consequence-free power fantasy
    - hopeful ending
    common_failure_modes:
    - Protagonist acts like a modern therapeutic saint who never makes hard compromises
    - Ending resolves all moral decay cleanly with a happy victory
    psychology_budget:
      level: conflict_bearing
      reason: Character psychology must drive compromise, but should not turn the
        story into therapy.
      motivation_clarity: required
      psychological_depth: required
      character_texture: encouraged
    scope_profile:
      natural_lengths:
      - novel
      - epic_novel
      - series
      minimum_viable_length: novella
      default_length: novel
      narrative_runway: long
      recommended_complexity: expanded
      mechanical_load: high
      worldbuilding_load: high
      cast_load: high
      compression_strategies:
      - Localize the power struggle to one city, fortress, or institution.
      - Use one protagonist and one corrupting arena.
      - Represent war or politics through immediate moral choices instead of full
        campaign structure.
      expansion_strategies:
      - Expand to epic novel or series before adding multiple factions, war fronts,
        or succession arcs.
      scope_failure_modes:
      - Faction machinery overwhelms the protagonist's moral pressure.
      - War epic scale appears without enough room for political setup and cost.
    setup_contract:
      emotional_runway: long
      relationship_establishment: optional
      baseline_world_establishment: required
      minimum_setup_beats:
      - Establish the corrupt/decaying nature of the world
      - Establish what the protagonist is forced to survive or protect
      - Show the cost of the existing order
      forbidden_shortcuts:
      - Starting with random violence before the systemic stakes or moral weight is
        legible
      compression_strategies:
      - Use a single highly-focused local conflict that mirrors the larger systemic
        corruption
    default_engine_biases:
    - Fusion of power acquisition with personal/moral loss
    recommended_subversions:
    - The protagonist's noble sacrifice is ignored or makes things worse
  genre_overrides: {}
structure:
  estimated_chapters: 45
  estimated_word_count: 150000
  act_structure: three_act
  max_pov_characters: 6
  max_characters_total: 50
  subplot_budget: 3
  scope_contract: null
story_engine:
  main_thread:
    type: main_plot
    want:
      author_text: Kael wants to end the war by destroying the tyrant who ruined his
        kingdom.
      checkable_claims:
      - protagonist_goal_has_visible_success_condition
      - goal_generates_active_pursuit
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: The tyrant's power is bound to the same cursed magic Kael is tempted
        to use.
      checkable_claims:
      - opposition_blocks_direct_resolution
      - resistance_tempts_protagonist_toward_corruption
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Kael can win quickly by becoming ruthless, or preserve his humanity
        and risk losing the war.
      checkable_claims:
      - external_goal_collides_with_internal_cost
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: Every victory bought with the ring saves people now while making
        Kael more dangerous later.
      checkable_claims:
      - stakes_escalate_through_success
      - success_has_visible_cost
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: Kael changes from wounded avenger into the new source of the darkness
        he meant to destroy.
      checkable_claims:
      - ending_state_inverts_starting_intent
      consequence_scale: null
      escalation_ceiling: null
    thematic_function: Tests whether justice becomes corruption when pursued without
      mercy.
  threads:
  - name: Lira's restraint
    type: character_arc
    want:
      author_text: Lira wants safety and justice without becoming another instrument
        of vengeance.
      checkable_claims:
      - subplot_goal_contrasts_main_goal
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: Her trauma and loyalty to Kael pull her toward the same violence
        she fears.
      checkable_claims:
      - resistance_is_personal_and_relational
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Helping Kael may save the realm but also enable his corruption.
      checkable_claims:
      - subplot_pressures_main_relationship
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: If Lira stays silent, Kael falls; if she opposes him, she may lose
        the person she trusts most.
      checkable_claims:
      - stakes_force_relational_choice
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: Lira moves from surviving harm to naming limits and refusing vengeance.
      checkable_claims:
      - arc_has_visible_refusal
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - contrasts
    - pressures_change
    thematic_function: Contrasts Kael by showing restraint as a form of strength.
  - name: The ring's cost
    type: survival
    want:
      author_text: The group wants to use the ring only when survival leaves no clean
        option.
      checkable_claims:
      - system_thread_creates_repeatable_cost
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: Each use solves immediate danger while worsening the ring's hold
        on Kael.
      checkable_claims:
      - resistance_escalates_with_use
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Refusing the ring risks death, but using it makes future mercy
        less likely.
      checkable_claims:
      - system_rule_forces_bad_choices
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: The ring turns survival decisions into moral debt that compounds
        across chapters.
      checkable_claims:
      - stakes_accumulate_over_time
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: The ring shifts from desperate tool to governing appetite.
      checkable_claims:
      - thread_changes_pressure_over_time
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - escalates
    - pays_off
    thematic_function: Makes the cost of power visible before Kael accepts it as identity.
contract:
  content_rating: R
  explicit_violence: allowed
  explicit_sex: fade_to_black
  profanity: moderate
  on_page_torture: false
  child_harm: false
  mandatory_ending_tone: bittersweet
  expected_elements:
  - mentor_death
  - major_betrayal
  - at_least_3_battles
  - protagonist_low_point_at_75_percent
  - thematic_reverberation_in_all_subplots
  forbidden_tropes:
  - chosen_one_prophecy
  - resurrected_hero
  - deus_ex_machina_rescue
  custom_rules:
  - No character can wield magic without paying a visible physical cost.
  - No fully hopeful resolution; bittersweet only.
emotional_design:
  overall_emotional_arc: descent into dread, then a defiant spike of hard-won meaning
  per_act_tones:
  - act_index: 1
    label: Setup
    tone: mystery and intrigue, subtle unease
  - act_index: 2
    label: Confrontation
    tone: rising dread with moments of camaraderie
  - act_index: 3
    label: Resolution
    tone: despair sharpening into catharsis
