characters:
- name: Caelan
  role: protagonist
  arc_type: corruption
  arc_start_percentage: 0
  arc_end_percentage: 100
  current_arc_percentage: 0
  key_milestones:
  - at_percentage: 15
    description: Caelan accepts the contract for Sol's delivery — tells himself it is just another job.
  - at_percentage: 25
    description: "First night on the road: Sol's silence becomes palpable. Caelan realizes the child is not merely quiet — something is being held back."
  - at_percentage: 30
    description: First sign that Sol's presence corrupts others. Caelan covers it up to keep moving.
  - at_percentage: 50
    description: The monastery's scouts arrive. Caelan realizes they want Sol opened, not saved.
  - at_percentage: 70
    description: "Caelan kills a monastery scout to protect Sol — the first innocent blood spilled for a cause he does not understand."
  - at_percentage: 85
    description: Sol communicates a warning. Caelan accepts that connection means vulnerability, and vulnerability is now a weapon.
  - at_percentage: 100
    description: "Caelan chooses apostasy — breaks the contract, damns himself, and prevents the entity's release."
  current_state:
    location: road_south
    physical: scarred_hands
    emotional: hollow_determination
    inventory:
    - oath_medallion
    - sealed_contract
    relationships:
    - other: Sol
      kind: reluctant_guardianship
      intensity: 0.3
    - other: Abbot Voss
      kind: contractual_obligation_turning_to_antagonism
      intensity: 0.6
    secrets_known: []
  identity:
    narrative_role: protagonist
    archetype: byronic_hero
    moral_alignment: chaotic_neutral
    psychology:
      wound: "His last command got his entire squad killed. He survived because he stayed back to relay orders — a tactical decision he has spent years calling cowardice."
      fear: "That he was never a good man pretending otherwise — that duty was always a mask for a man too afraid to choose."
      desire: "To believe one clean act can undo a lifetime of compromise."
      vulnerability_family: worthlessness
      defense_mechanisms:
      - intellectualization
      - repression
      contradictions:
      - "Craves honor but knows honor is what the powerful call obedience."
      - "Despises the monastery's corruption but needs their payment to disappear."
      intimacy: blocked_by_shame
    texture:
      voice: "Few words, worn flat by years of delivering death notices and receiving no thanks."
      gestures:
      - rolls his left shoulder when lying
      - touches Sol's head before sleep to check for breath
      aesthetic: "Faded surcoat with a torn badge he never repaired."
      behavioral_tells:
      - speaks louder when unsure
      - stops talking entirely when certain
      social_aura: withdrawn_but_not_hostile
    essence: "A man who stopped believing in goodness but cannot stop acting as if it exists."
    motifs:
    - broken promises
    - unpaid debts
    - cold meals
  categorization: null
- name: Abbot Voss
  role: antagonist
  arc_type: flat
  arc_start_percentage: 0
  arc_end_percentage: 0
  current_arc_percentage: 0
  key_milestones:
  - at_percentage: 50
    description: Voss's first letter to Caelan — courteous, doctrinal, absolutely immovable.
  - at_percentage: 75
    description: "Voss reveals the monastery's true purpose: the entity is a purification engine."
  current_state:
    location: fallen_monastery
    physical: intact
    emotional: serene_conviction
    inventory:
    - ceremonial_seal_key
    - doctrine_scrolls
    relationships:
    - other: Caelan
      kind: tool_to_be_used
      intensity: 0.8
    secrets_known:
    - the monastery fabricated the entity's containment story
    - the last vessel died and Sol is a replacement
  identity:
    narrative_role: antagonist
    archetype: false_mentor
    moral_alignment: lawful_evil
    psychology:
      wound: "Voss watched his predecessor fail to control the entity during a purge attempt. The failure cost half the monastery. He believes the only failure is hesitation."
      fear: "That the entity cannot be controlled at all — but admits this to no one."
      desire: "To wield the entity as a divine instrument and remake the world in purified ashes."
      vulnerability_family: control
      defense_mechanisms:
      - rationalization
      - intellectualization
      contradictions:
      - "Preaches salvation but plans annihilation."
      - "Believes he serves God but has not prayed in years."
    texture:
      voice: "Smooth, liturgical cadence — never raises it, never needs to."
      gestures:
      - touches his temple when lying
      - opens palms when making an irrevocable demand
      aesthetic: "Stained white vestments he insists are clean."
      social_aura: serene_dominance
    essence: "A true believer who crossed the line so gradually he forgot it existed."
    motifs:
    - sealed doors
    - old incense
    - unread scripture
  categorization: null
