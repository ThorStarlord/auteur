story_engine:
  main_thread:
    type: main_plot
    want:
      author_text: Deliver the child safely to the monastery and earn back his honor.
      checkable_claims:
      - 'protagonist acts on desire: Deliver the child safely to the monastery and
        earn back his honor.'
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: The child's presence corrupts everyone they meet, and the monastery
        wants the entity released, not contained.
      checkable_claims:
      - 'resistance from: The child''s presence corrupts everyone they meet,'
      - 'resistance from: the monastery wants the entity released, not contained.'
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Keeping his oath to deliver the child vs. recognizing that delivery
        is an atrocity — a dread that grows with every step closer to the monastery.
      checkable_claims:
      - 'collision point emerges: Keeping his oath to deliver the child vs. recognizing
        that delivery is an atroci'
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: His soul, the child's humanity, and the region's fate if the entity
        is unleashed.
      checkable_claims:
      - 'personal stakes are tested: His soul, the child''s humanity, and the region''s
        fate if the entity is unleashed'
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: He stops being a man who follows orders and becomes a man who chooses
        damnation to prevent a greater evil.
      checkable_claims:
      - 'protagonist undergoes transformation: He stops being a man who follows orders
        and becomes a man who chooses damnation '
      consequence_scale: null
      escalation_ceiling: null
    thematic_function: 'Explores whether any contract can be honored without becoming
      a shadow of yourself — and whether the sacrifice of one child damns or redeems
      the one who carries them.'
  threads:
  - name: Corruption Echo
    type: thematic_echo
    want:
      author_text: Protect Sol from the corruption consuming everyone on the road.
      checkable_claims:
      - 'protagonist acts on desire: Protect Sol from the corruption consuming everyone
        on the road.'
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: Sol's silence is a contract the knight cannot read — the child may
        already be a shadow wearing human skin.
      checkable_claims:
      - 'resistance from: Sol''s silence is an unreadable contract'
      - 'resistance from: the child may already be a shadow wearing human skin'
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Treating Sol as a child to save vs. treating Sol as a vessel to
        contain.
      checkable_claims:
      - 'collision point emerges: Treating Sol as a child to save vs. treating Sol
        as a vessel to contain.'
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: If Sol is still human, killing the vessel murders an innocent. If
        Sol is already consumed, mercy becomes atrocity.
      checkable_claims:
      - 'personal stakes are tested: If Sol is still human, killing the vessel murders
        an innocent. If Sol is already consumed, mercy becomes atrocity.'
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: The knight accepts he will never know which truth was real — the
        sacrifice was the only contract he could keep.
      checkable_claims:
      - 'protagonist undergoes transformation: The knight accepts he will never know
        which truth was real — the sacrifice was the only contract he could keep.'
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - pressures_change
    thematic_function: 'The shadows inside Sol are a series of contracts the knight
      cannot refuse: sacrifices for the child''s soul are always also sacrifices
      of his own.'
  - name: The Monastery's Secret
    type: mystery
    want:
      author_text: Reach the monastery and deliver Sol to the abbot as promised.
      checkable_claims:
      - 'protagonist acts on desire: Reach the monastery and deliver Sol to the abbot
        as promised.'
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: The monastery sends scouts to hasten the journey, and each encounter
        reveals more rot in their doctrine.
      checkable_claims:
      - 'resistance from: the monastery sends scouts to hasten the journey'
      - 'resistance from: each encounter reveals more rot in the monastery doctrine'
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Honoring the letter of his contract vs. recognizing the monastery
        wants the entity unleashed, not contained.
      checkable_claims:
      - 'collision point emerges: Honoring the letter of his contract vs. recognizing
        the monastery wants the entity unleashed, not contained.'
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: Delivering Sol means the entity is freed. Breaking the contract
        means the knight is hunted.
      checkable_claims:
      - 'external stakes are tested: Delivering Sol means the entity is freed. Breaking
        the contract means the knight is hunted.'
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: The knight stops being a courier who follows orders and becomes
        an apostate who chooses damnation to prevent release.
      checkable_claims:
      - 'protagonist undergoes transformation: The knight stops being a courier who
        follows orders and becomes an apostate who chooses damnation to prevent release.'
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - escalates
    - pressures_change
    thematic_function: 'The monastery''s shadow doctrine reveals that every contract
      with power demands a sacrifice — and the only choice is what to pay.'
  - name: Sol's Remaining Bridge
    type: relationship_arc
    want:
      author_text: Pierce Sol's silence and find the person beneath the vessel.
      checkable_claims:
      - 'protagonist acts on desire: Pierce Sol''s silence and find the person beneath
        the vessel.'
      consequence_scale: null
      escalation_ceiling: null
    resistance:
      author_text: Sol trusts no one, and the entity inside resists every human connection
        the knight tries to build.
      checkable_claims:
      - 'resistance from: Sol trusts no one'
      - 'resistance from: the entity inside resists every human connection'
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: The only way to reach Sol is through vulnerability, but vulnerability
        is how the entity enters.
      checkable_claims:
      - 'collision point emerges: The only way to reach Sol is through vulnerability,
        but vulnerability is how the entity enters.'
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: If the knight opens up, the entity may corrupt him faster. If he
        stays closed, Sol stays alone inside the shadow.
      checkable_claims:
      - 'personal stakes are tested: If the knight opens up, the entity may corrupt
        him faster. If he stays closed, Sol stays alone inside the shadow.'
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: A single moment of real connection before the end — enough for the
        knight to know Sol was real, and enough to make the final choice unbearable.
      checkable_claims:
      - 'protagonist undergoes transformation: A single moment of real connection before
        the end — enough for the knight to know Sol was real, and enough to make the
        final choice unbearable.'
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - complicates
    - pressures_change
    thematic_function: 'The fragile bridge between knight and child is a contract written
      in shadows: human connection may be the only sacrifice worth making.'
