identity:
  title: The Hollow Covenant
  author_intent: A disgraced knight escorts a mute child to a fallen monastery, discovering
    the child is a vessel for a corrupting entity and the monastery's redemption is
    a lie.
  target_experience:
    primary: dread
    progression: unease -> suspicion -> dread -> despair
    secondary: []
