theme:
  central_question: When every contract demands a sacrifice, is there anything left
    worth saving — and does the attempt save you or damn you?
  thesis: 'Dread is the only honest response to a world where loyalty requires atrocity:
    the shadows we accept in others are always already inside us, and the only contract
    worth keeping is the one that costs everything.'
  motifs:
  - shadows
  - contracts
  - sacrifices
