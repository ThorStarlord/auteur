      checkable_claims: []
      consequence_scale: null
      escalation_ceiling: null
    conflict:
      author_text: Using dark power to keep them safe vs letting them see the cost
        of the corruption.
      checkable_claims: []
      consequence_scale: null
      escalation_ceiling: null
    stakes:
      author_text: Watching the ally turn into the same monstrous thing the protagonist
        is becoming.
      checkable_claims: []
      consequence_scale: null
      escalation_ceiling: null
    change:
      author_text: The ally succumbs fully, providing a tragic mirror of the protagonist's
        destination.
      checkable_claims: []
      consequence_scale: null
      escalation_ceiling: null
    supports_main_by:
    - pressures_change
    thematic_function: Proves the bleakgrim core truth that corruption spreads to
