identity:
  title: The Shattered Crown
  author_intent: A grimdark epic about a hero who succeeds at his quest by becoming
    the thing he hunted.
  target_experience:
    primary: dread
    progression: unease -> dread -> catharsis
    avoid:
    - triumphant power fantasy
    - cozy safety
  length_class: novel
  genre: grimdark_fantasy
  subgenre: grimdark
  subgenres:
  - grimdark
  - corruption_tragedy
  mode: tragic
  medium: novel
  target_audience: adult
  pov_type: third_person_limited_single
structure:
  estimated_chapters: 25
  estimated_word_count: 90000
  act_structure: three_act
  max_pov_characters: 3
  max_characters_total: 25
  subplot_budget: 3
story_engine:
  main_thread:
    type: main_plot
    want:
      author_text: Kael wants to end the war by destroying the tyrant who ruined his
        kingdom.
      checkable_claims: []
    resistance:
      author_text: The tyrant's power is bound to the same cursed magic Kael is tempted
        to use.
      checkable_claims: []
    conflict:
      author_text: Kael can win quickly by becoming ruthless, or preserve his humanity
        and risk losing the war.
      checkable_claims: []
    stakes:
      author_text: Every victory bought saves people now while making Kael more dangerous
        later.
      checkable_claims: []
    change:
      author_text: Kael changes from a wounded avenger into the new source of darkness.
      checkable_claims: []
    thematic_function: 'Explores the central question: Will Lira betray Kael before
      the final gate?'
  threads: []
