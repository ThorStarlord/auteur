genre_id: sci_fi
display_name: "Science Fiction"
core_truth: "Technology and discovery change what it means to be human."
audience_product: "Wonder, intellectual challenge, extrapolation, moral questions through technological lenses."
primary_excitement_beats:
  - "scientific discovery or technological breakthrough"
  - "the ethical dilemma posed by new capability"
  - "first contact or encounter with the unfamiliar"
  - "the price of progress revealed"
  - "the human choice in a technological world"
required_tropes:
  - "technology or science that changes human condition or society"
  - "a speculative premise that extrapolates from current reality"
  - "consequence of scientific ambition or discovery"
  - "a protagonist whose expertise or perspective is tested by the premise"
optional_tropes:
  - "first contact"
  - "dystopian or utopian society"
  - "artificial intelligence or uploaded consciousness"
  - "space exploration or colonization"
  - "time dilation or manipulation"
forbidden_mismatches:
  - "technology with no cost, limitation, or unintended consequence"
  - "science that violates its own established rules without explanation"
  - "purely human drama that could exist in any setting without the speculative element"
  - "protagonist who is passive while the technology drives the plot"
common_failure_modes:
  - "Infodumps about the technology replace dramatized consequences"
  - "The speculative premise is introduced but not explored to its logical conclusion"
  - "Characters become mouthpieces for opposing philosophies rather than full people"
  - "The worldbuilding is ahead of the emotional arc"
psychology_budget:
  level: "conflict_bearing"
  reason: "Sci-fi needs characters to grapple with the human cost of technological change, but should avoid pure therapy in favor of philosophical pressure."
  motivation_clarity: "required"
  psychological_depth: "required"
  character_texture: "encouraged"
default_engine_biases:
  - "Main thread driven by discovery and its consequences"
  - "Thematic threads explore the central speculative question from multiple angles"
recommended_subversions:
  - "The technology that was supposed to save humanity is what destroys it"
  - "First contact is not with aliens but with a transformed version of humanity"
scope_profile:
  natural_lengths:
    - novella
    - novel
  minimum_viable_length: novella
  default_length: novel
  narrative_runway: medium
  recommended_complexity: standard
  mechanical_load: medium
  worldbuilding_load: medium
  cast_load: low
  compression_strategies:
    - "Focus on one technological premise and its immediate human consequences."
    - "Use a single location or contained system to explore the speculative question."
  expansion_strategies:
    - "Add multiple societal perspectives on the technology."
    - "Expand timeline to show generational effects of the speculative change."
  scope_failure_modes:
    - "Too many speculative ideas competing for attention without full exploration."
    - "The technology is handwaved rather than extrapolated from coherent rules."

setup_contract:
  emotional_runway: medium
  relationship_establishment: optional
  baseline_world_establishment: required
  minimum_setup_beats:
    - "Establish the familiar world before the speculative disruption"
    - "Introduce the technology or discovery that triggers the premise"
    - "Show the protagonist's relationship to the speculative element"
  forbidden_shortcuts:
    - "Full technology exposition before the protagonist's stake in it is clear"
    - "The speculative premise arriving without any grounding in relatable human context"
  compression_strategies:
    - "Reveal the speculative premise through action rather than explanation."
    - "Start after the change and reveal the pre-change world through memory."
